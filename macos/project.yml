name: ClaudeTogether
options:
  bundleIdPrefix: com.alanroybal
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

settings:
  base:
    PRODUCT_NAME: ClaudeTogether
    PRODUCT_MODULE_NAME: ClaudeTogether
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  ClaudeTogether:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alanroybal.claudetogether
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        # Link the Zig static lib and expose its C header as a Swift module
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/Vendor
        SWIFT_INCLUDE_PATHS:
          - $(SRCROOT)/Vendor
        OTHER_LDFLAGS:
          - -lcollabterm
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    postBuildScripts:
      - name: Bundle bore helper
        # Bundle bore as nested code under Contents/Helpers. Launching a Mach-O
        # from Contents/Resources gets rejected by taskgated as invalid nested
        # code even when the outer app is signed.
        script: |
          set -euo pipefail
          SRC="$SRCROOT/Resources/bore"
          DST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers/bore"
          if [[ ! -f "$SRC" ]]; then
            echo "error: bore binary missing at $SRC — run scripts/build-bore.sh first" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod +x "$DST"
          codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY:--}" "$DST"
          rm -f "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/bore"
          echo "bundled bore helper -> $DST"
        shell: /bin/bash
